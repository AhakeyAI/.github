name: Bug report
description: Report a reproducible bug in AhaKey official software, documentation, or protocol-related tooling
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please provide enough detail so we can understand and reproduce the problem.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: Tell us what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Tell us what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Please provide clear reproduction steps.
      placeholder: |
        1. Go to ...
        2. Connect device ...
        3. Click ...
        4. See error ...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Related area
      options:
        - Desktop client
        - Protocol documentation
        - BLE communication
        - Documentation
        - Build / install
        - Other
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform / OS
      placeholder: e.g. macOS 15, Windows 11, Ubuntu 24.04

  - type: input
    id: version
    attributes:
      label: App / repo version
      placeholder: e.g. v0.1.0 or commit hash

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or extra context
      description: Add anything that may help debugging.
      placeholder: Paste logs or attach screenshots here.
